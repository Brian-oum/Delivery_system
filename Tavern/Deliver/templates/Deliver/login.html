{% extends "Deliver/base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0 p-4" style="width: 100%; max-width: 450px; border-radius: 15px;">
        <div class="card-body">
            <h2 class="fw-bold text-center mb-4" style="color: #333;">Login</h2>
            
            <form method="post" class="needs-validation">
                {% csrf_token %}
                
                {# Customizing how Django renders the form fields #}
                <div class="mb-3">
                    {{ form.as_p }}
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mt-2" 
                        style="border-radius: 8px; transition: 0.3s;">
                    Sign In
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small">Don't have an account? 
                    <a href="{% url 'register' %}" class="text-decoration-none fw-bold text-primary">Register</a>
                </p>
                <hr class="my-4">
                <p class="small text-muted mb-0">Secure Access for Authorized Users</p>
            </div>
        </div>
    </div>
</div>

<style>
    /* Styling the default Django form fields to match Bootstrap */
    form p label {
        display: block;
        font-weight: 500;
        margin-bottom: 5px;
        color: #555;
    }
    
    form p input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.2s;
    }

    form p input:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }

    .btn-primary:hover {
        background-color: #0b5ed7;
        transform: translateY(-1px);
    }
</style>
{% endblock %}
