{% extends "Deliver/base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh; padding-top: 2rem; padding-bottom: 2rem;">
    <div class="card shadow-lg border-0 p-4" style="width: 100%; max-width: 500px; border-radius: 15px;">
        <div class="card-body">
            <h2 class="fw-bold text-center mb-4" style="color: #333;">Create Account</h2>
            
            <form method="post" class="needs-validation">
                {% csrf_token %}
                
                {# Modernizing the default Django form output #}
                <div class="registration-form">
                    {{ form.as_p }}
                </div>

                <button type="submit" class="btn btn-success w-100 py-2 fw-bold mt-3" 
                        style="border-radius: 8px; transition: 0.3s; background-color: #28a745; border: none;">
                    Register Now
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small">Already have an account? 
                    <a href="{% url 'login' %}" class="text-decoration-none fw-bold text-success">Login</a>
                </p>
                <hr class="my-4">
                <p class="small text-muted mb-0">Join our delivery network today.</p>
            </div>
        </div>
    </div>
</div>

<style>
    /* Styling Django's form.as_p to look like modern Bootstrap inputs */
    .registration-form p {
        margin-bottom: 1.2rem;
    }

    .registration-form label {
        display: block;
        font-weight: 500;
        margin-bottom: 6px;
        color: #444;
        font-size: 0.95rem;
    }
    
    .registration-form input, 
    .registration-form select, 
    .registration-form textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ced4da;
        border-radius: 8px;
        outline: none;
        transition: all 0.2s ease-in-out;
    }

    .registration-form input:focus {
        border-color: #28a745;
        box-shadow: 0 0 0 0.25rem rgba(40, 167, 69, 0.15);
    }

    /* Help text styling (e.g., password requirements) */
    .helptext {
        display: block;
        font-size: 0.8rem;
        color: #6c757d;
        margin-top: 4px;
    }

    .btn-success:hover {
        background-color: #218838 !important;
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
</style>
{% endblock %}
