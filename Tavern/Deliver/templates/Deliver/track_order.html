{% extends "Deliver/base.html" %}

{% block content %}

<h2>Track Order #{{ order.id }} (Premium Live Routing)</h2>

<div id="map" style="height:550px; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.2);"></div>

<p id="status" style="margin-top:10px; font-weight:bold; color:#2a2a2a;">
    {{ tracking.status|default:"Waiting for driver" }}
</p>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-wx5yf3RZ0CKUO4h71+O8m3F+Z+Ku+7V8D2f1mxs9+cwR3nK5nSXYR+v/N1TFBz4v+eNfHHcE8c+F67yoXk9HiQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
// --- Data Setup ---
var customerLat = {{ order.latitude|default:0|floatformat:6 }};
var customerLng = {{ order.longitude|default:0|floatformat:6 }};
var driverLat = {{ tracking.driver_latitude|default:order.latitude|default:0|floatformat:6 }};
var driverLng = {{ tracking.driver_longitude|default:order.longitude|default:0|floatformat:6 }};

// --- Initialize Map ---
var map = L.map('map').setView([driverLat, driverLng], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// --- Custom Icons ---
var truckIcon = L.divIcon({
    html: '<i class="fas fa-truck fa-2x" style="color:#007bff;"></i>',
    className: '',
    iconSize: [40, 40],
    iconAnchor: [20, 20]
});

var customerIcon = L.divIcon({
    html: '<i class="fas fa-map-pin fa-2x" style="color:#28a745;"></i>',
    className: '',
    iconSize: [40, 40],
    iconAnchor: [20, 20]
});

// --- Markers ---
var customerMarker = L.marker([customerLat, customerLng], {icon: customerIcon})
    .addTo(map)
    .bindPopup("<b>Delivery Location</b>")
    .openPopup();

var driverMarker = L.marker([driverLat, driverLng], {icon: truckIcon})
    .addTo(map)
    .bindPopup("<b>Driver Location</b>")
    .openPopup();

// --- Routing Control ---
var control = L.Routing.control({
    waypoints: [
        L.latLng(driverLat, driverLng),
        L.latLng(customerLat, customerLng)
    ],
    lineOptions: {styles: [{ color: '#00aaff', opacity: 0.8, weight: 6 }]},
    createMarker: function(i, wp) { return null; }, // we already have custom markers
    routeWhileDragging: false,
    addWaypoints: false,
    show: false
}).addTo(map);

// --- Smooth Driver Movement ---
var routeCoords = [];
var moving = false;

function fetchDriverLocation() {
    fetch("/driver-location/{{ order.id }}/")
    .then(res => res.json())
    .then(data => {
        document.getElementById("status").innerText = data.status || "Driver on the way";

        var newLat = parseFloat(data.lat);
        var newLng = parseFloat(data.lng);

        // Push new location to routeCoords
        routeCoords.push([newLat, newLng]);

        if(!moving){
            moveDriverSmoothly();
        }
    })
    .catch(err => console.error("Error fetching driver location:", err));
}

function moveDriverSmoothly(){
    if(routeCoords.length === 0) { moving = false; return; }
    moving = true;

    var nextPos = routeCoords.shift();
    var currentPos = driverMarker.getLatLng();

    var steps = 50;
    var step = 0;
    var latStep = (nextPos[0] - currentPos.lat)/steps;
    var lngStep = (nextPos[1] - currentPos.lng)/steps;

    function animateStep(){
        if(step >= steps){
            driverMarker.setLatLng(nextPos);
            map.panTo(nextPos);
            moveDriverSmoothly(); // Move to next coordinate if available
            return;
        }
        var lat = currentPos.lat + latStep*step;
        var lng = currentPos.lng + lngStep*step;
        driverMarker.setLatLng([lat, lng]);
        map.panTo([lat, lng]);
        step++;
        requestAnimationFrame(animateStep);
    }

    animateStep();
}

// --- Polling every 3 seconds for live updates ---
setInterval(fetchDriverLocation, 3000);
</script>

{% endblock %}
